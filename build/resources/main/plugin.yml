name: StorePulse
version: 1.0.1
main: net.pluginsmith.monetization.MonetizationPlugin
api-version: '1.21'
description: StorePulse plugin with unified payment webhooks, Discord integration, and goal management.
website: https://studio.z-craft.xyz
authors: [ZCraft Studios]
folia-supported: true

commands:
  topdonors:
    description: View the top supporters.
    usage: "/<command> [page]"
    permission: storepulse.view.topdonors
  recentpurchases:
    description: View recent purchases.
    usage: "/<command> [page]"
    permission: storepulse.view.recentpurchases
  goalstatus:
    description: View the status of donation goals.
    usage: "/<command> [goalId]"
    permission: storepulse.view.goalstatus
  goalcreate:
    description: Create a new donation goal.
    usage: "/<command> <id> <name> <targetAmount> [expiryDays]"
    permission: storepulse.admin.goal
  goaledit:
    description: Edit an existing donation goal.
    usage: "/<command> <id> <name|target|current|expiry|complete> <value>"
    permission: storepulse.admin.goal
  reloadmonetization:
    description: Reload the plugin configuration.
    usage: "/<command>"
    permission: storepulse.admin.reload
  reloadstorepulse:
    description: Reload the plugin configuration.
    usage: "/<command>"
    permission: storepulse.admin.reload

permissions:
  storepulse.view.topdonors:
    description: Allows viewing top donors.
    default: true
  storepulse.view.recentpurchases:
    description: Allows viewing recent purchases.
    default: true
  storepulse.view.goalstatus:
    description: Allows viewing donation goal status.
    default: true
  storepulse.admin.goal:
    description: Allows creating and editing donation goals.
    default: op
  storepulse.admin.reload:
    description: Allows reloading the plugin configuration.
    default: op
  storepulse.admin:
    description: Grants all storepulse admin permissions.
    default: op

softdepend: [PlaceholderAPI, DiscordSRV, LuckPerms, Vault]