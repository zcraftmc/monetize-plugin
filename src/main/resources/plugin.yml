name: StorePulse
version: 1.0.0
main: net.pluginsmith.monetization.MonetizationPlugin
api-version: '1.21'
description: StorePulse plugin with unified payment webhooks, Discord integration, and goal management.
website: https://studio.z-craft.xyz
authors: [ZCraft Studios]
folia-supported: true

commands:
  storepulse:
    description: StorePulse core command for webhook and goal management.
    usage: "/storepulse <top|recent|goal|reload>"
    aliases: [sp]
    permission: storepulse.admin
  topdonors:
    description: StorePulse: view the top supporters.
    usage: "/topdonors [limit]"
    permission: storepulse.view.topdonors
  recentpurchases:
    description: StorePulse: view recent purchases.
    usage: "/recentpurchases [limit]"
    permission: storepulse.view.recentpurchases
  goalstatus:
    description: StorePulse: view the status of donation goals.
    usage: "/goalstatus <goalId>"
    permission: storepulse.view.goalstatus
  goalcreate:
    description: StorePulse: create a new donation goal.
    usage: "/goalcreate <id> <name> <targetAmount> [expiryDays]"
    permission: storepulse.admin.goal
  goaledit:
    description: StorePulse: edit an existing donation goal.
    usage: "/goaledit <id> <name|target|current|expiry|complete> <value>"
    permission: storepulse.admin.goal
  reloadmonetization:
    description: StorePulse: reload the plugin configuration.
    usage: "/reloadmonetization"
    permission: storepulse.admin.reload
  reloadstorepulse:
    description: StorePulse: reload the plugin configuration.
    usage: "/reloadstorepulse"
    permission: storepulse.admin.reload

permissions:
  storepulse.view.topdonors:
    description: Allows viewing top donors.
    default: true
  storepulse.view.recentpurchases:
    description: Allows viewing recent purchases.
    default: true
  storepulse.view.goalstatus:
    description: Allows viewing donation goal status.
    default: true
  storepulse.admin.goal:
    description: Allows creating and editing donation goals.
    default: op
  storepulse.admin.reload:
    description: Allows reloading the plugin configuration.
    default: op
  storepulse.admin:
    description: Grants all storepulse admin permissions.
    default: op

softdepend: [PlaceholderAPI, DiscordSRV, LuckPerms, Vault]