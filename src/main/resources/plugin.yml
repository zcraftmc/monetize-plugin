name: Monetization
version: 1.0.0
main: net.pluginsmith.monetization.MonetizationPlugin
api-version: '1.21'
description: Premium Minecraft monetization plugin with Discord webhook integration | Generated by PluginSmith.net
website: https://pluginsmith.net
authors: [PluginSmith]
folia-supported: true

commands:
  topdonors:
    description: View the top supporters.
    usage: "/<command> [page]"
    permission: monetization.view.topdonors
  recentpurchases:
    description: View recent purchases.
    usage: "/<command> [page]"
    permission: monetization.view.recentpurchases
  goalstatus:
    description: View the status of donation goals.
    usage: "/<command> [goalId]"
    permission: monetization.view.goalstatus
  goalcreate:
    description: Create a new donation goal.
    usage: "/<command> <id> <name> <targetAmount> [expiryDays]"
    permission: monetization.admin.goal
  goaledit:
    description: Edit an existing donation goal.
    usage: "/<command> <id> <name|target|current|expiry|complete> <value>"
    permission: monetization.admin.goal
  reloadmonetization:
    description: Reload the plugin configuration.
    usage: "/<command>"
    permission: monetization.admin.reload

permissions:
  monetization.view.topdonors:
    description: Allows viewing top donors.
    default: true
  monetization.view.recentpurchases:
    description: Allows viewing recent purchases.
    default: true
  monetization.view.goalstatus:
    description: Allows viewing donation goal status.
    default: true
  monetization.admin.goal:
    description: Allows creating and editing donation goals.
    default: op
  monetization.admin.reload:
    description: Allows reloading the plugin configuration.
    default: op
  monetization.admin:
    description: Grants all monetization admin permissions.
    default: op

softdepend: [PlaceholderAPI, DiscordSRV, LuckPerms, Vault]